<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Script Builder</title>
<style>
  /* Big, friendly, readable — dyslexia- and kid-friendly per SPEC.md */
  body {
    font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    background: #FFF8E7;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: #FF8C42;
    color: white;
    padding: 16px 24px;
    font-size: 1.5em;
    font-weight: bold;
  }
  #staffReminder {
    background: #FFF3C4;
    border-bottom: 2px solid #E8C547;
    padding: 8px 24px;
    font-size: 1em;
    color: #6B5900;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bubble {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 1.2em;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .staff { background: #4E89AE; color: white; align-self: flex-end; }
  .claude { background: white; border: 3px solid #FF8C42; align-self: flex-start; }
  .error { background: #FFD6D6; border: 3px solid #D64545; align-self: center; }
  form {
    display: flex;
    gap: 10px;
    padding: 16px 24px;
    background: #FFEFD0;
  }
  input {
    flex: 1;
    font-size: 1.2em;
    padding: 14px;
    border-radius: 12px;
    border: 3px solid #FF8C42;
  }
  button {
    font-size: 1.2em;
    padding: 14px 26px;
    border-radius: 12px;
    border: none;
    background: #FF8C42;
    color: white;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; }
  #cardsButton { background: #4E9F3D; }

  /* Step cards button sleeps (dim) until the story is complete */
  #cardsButton.waiting { opacity: 0.45; }

  /* When the story is ready, the Step cards button glows to say "press me!" */
  #cardsButton.ready {
    animation: glow 1.2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 4px #4E9F3D; transform: scale(1); }
    to   { box-shadow: 0 0 22px #4E9F3D; transform: scale(1.06); }
  }
  .bigNext {
    background: #EAF7E4;
    border: 3px solid #4E9F3D;
    border-radius: 18px;
    padding: 18px;
    align-self: center;
    text-align: center;
    font-size: 1.25em;
  }
  .bigNext button {
    display: block;
    margin: 12px auto 0 auto;
    background: #4E9F3D;
    font-size: 1.2em;
  }

  /* Card mode — full screen, one card at a time, like slides */
  #cardMode {
    position: fixed;
    inset: 0;
    background: #2B4162;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 20px;
    z-index: 10;
  }
  #cardMode.open { display: flex; }
  #cardDots { color: white; font-size: 1.4em; letter-spacing: 6px; }
  #bigCard {
    background: white;
    border-radius: 24px;
    padding: 28px 32px;
    max-width: 640px;
    width: 90%;
    max-height: 65vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  #bigCard .emoji { font-size: 3.5em; text-align: center; }
  #bigCard h2 { font-size: 1.8em; margin: 8px 0; text-align: center; }
  #bigCard .say { font-size: 1.35em; line-height: 1.5; margin-bottom: 16px; }
  #bigCard .setup {
    background: #EEF7EA;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 1.05em;
    line-height: 1.8;
    white-space: pre-wrap;
  }
  #cardButtons { display: flex; gap: 14px; }
  #cardButtons button { font-size: 1.3em; padding: 16px 28px; }
  #backButton, #nextButton { background: #4E9F3D; }
  #hearButton { background: #4E89AE; }
  #exitButton {
    position: absolute;
    top: 16px;
    right: 20px;
    background: transparent;
    font-size: 2em;
    padding: 4px 10px;
  }
  #voicePicker {
    font-family: inherit;
    font-size: 1em;
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
  }

  /* Home page — first thing you see: new story, or a saved movie */
  #homePage {
    position: fixed;
    inset: 0;
    background: #FFF8E7;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
    z-index: 20;
  }
  #homePage.open { display: flex; }
  #homePage h1 { font-size: 2.2em; margin: 0; }
  #newStoryButton { font-size: 1.5em; padding: 20px 40px; }
  #savedList {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 90%;
    max-width: 480px;
    max-height: 40vh;
    overflow-y: auto;
  }
  .savedMovie {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .savedMovie .openMovie {
    flex: 1;
    background: white;
    color: #333;
    border: 3px solid #4E89AE;
    text-align: left;
  }
  .savedMovie .deleteMovie { background: #D64545; }
  #homeButton {
    position: absolute;
    top: 10px;
    right: 16px;
    background: transparent;
    font-size: 1.4em;
  }
  #saveButton { background: #E8A03E; }
</style>
</head>
<body>

<header>🎬 Script Builder <button id="homeButton" title="Home">🏠</button></header>

<!-- Home page: start a new story, or open a saved movie's step cards -->
<div id="homePage" class="open">
  <h1>🎬 Script Builder</h1>
  <button id="newStoryButton">New story ▶</button>
  <div id="savedList"></div>
</div>
<div id="staffReminder">🛡️ Staff reminder: describe the story, not the kids — no names, ages, or schools.</div>

<div id="messages">
  <div class="bubble claude">What's your movie idea? 🎬 Type it and let's make a story! Like: "a cat who dreams of flying".</div>
</div>

<!-- Card mode: full screen, one card at a time, like slides -->
<div id="cardMode">
  <button id="exitButton" title="Back to chat">✕</button>
  <div id="cardDots"></div>
  <div id="bigCard"></div>
  <div id="cardButtons">
    <button id="backButton">◀ Back</button>
    <button id="hearButton">Hear it 🔊</button>
    <button id="saveButton">Save 💾</button>
    <button id="nextButton">Next ▶</button>
  </div>
  <select id="voicePicker" title="Choose the reading voice"></select>
</div>

<form id="chatForm">
  <input id="chatInput" placeholder="Type here, then press Send…" autocomplete="off">
  <button id="sendButton">Send 🎥</button>
  <button id="cardsButton" type="button" class="waiting">Step cards 🗂️</button>
</form>

<script>
// The whole conversation lives here, in the page (per SPEC.md:
// nothing about children is stored anywhere).
const history = [];

const messagesBox = document.getElementById("messages");
const form = document.getElementById("chatForm");
const input = document.getElementById("chatInput");
const button = document.getElementById("sendButton");

function showBubble(text, who) {
  const bubble = document.createElement("div");
  bubble.className = "bubble " + who;
  bubble.textContent = text;
  messagesBox.appendChild(bubble);
  messagesBox.scrollTop = messagesBox.scrollHeight;
  return bubble;
}

form.addEventListener("submit", async (event) => {
  event.preventDefault();                 // don't reload the page
  const text = input.value.trim();
  if (!text) return;

  showBubble(text, "staff");
  history.push({ role: "user", content: text });
  input.value = "";
  button.disabled = true;
  const waiting = showBubble("🎬 Thinking…", "claude");

  try {
    // Send the whole conversation to our little server (server.py)
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ history: history }),
    });
    const reply = await response.json();

    if (reply.error) {
      waiting.remove();
      showBubble("⚠️ " + reply.error, "error");
    } else if (reply.text.includes("[STORY READY]")) {
      // The story is complete! Show the reply without the secret marker,
      // then make "Step cards" the big obvious next step.
      const cleanText = reply.text.replace("[STORY READY]", "").trim();
      waiting.textContent = cleanText;
      history.push({ role: "assistant", content: cleanText });
      showStoryReady();
    } else {
      waiting.textContent = reply.text;
      history.push({ role: "assistant", content: reply.text });
    }
  } catch {
    waiting.remove();
    showBubble("⚠️ Couldn't reach the server. Is server.py still running?", "error");
  }

  button.disabled = false;
  input.focus();
});

// Step cards are locked until the story is complete
let storyReady = false;

// When the story is complete: a big invitation + a glowing button,
// so the next step is impossible to miss.
function showStoryReady() {
  storyReady = true;
  cardsButton.classList.remove("waiting");
  const invite = document.createElement("div");
  invite.className = "bigNext";
  invite.textContent = "🎉 Your story is ready, director! Next step:";

  const go = document.createElement("button");
  go.textContent = "Make my step cards 🗂️";
  go.addEventListener("click", () => {
    invite.remove();
    cardsButton.click();
  });

  invite.appendChild(go);
  messagesBox.appendChild(invite);
  messagesBox.scrollTop = messagesBox.scrollHeight;

  cardsButton.classList.add("ready");   // make the bottom button glow too
}

// The "Step cards" button: turn the brainstormed story into filming cards,
// then show them full screen, one at a time, like slides.
const cardsButton = document.getElementById("cardsButton");
const cardMode = document.getElementById("cardMode");
const bigCard = document.getElementById("bigCard");
const cardDots = document.getElementById("cardDots");

let cards = [];        // the cards Claude made
let cardIndex = 0;     // which card is on screen right now

// ---- Voice picker: choose which voice reads the cards ----
const voicePicker = document.getElementById("voicePicker");

function loadVoices() {
  // List the English voices this computer has installed
  const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith("en"));
  if (voices.length === 0) return;

  voicePicker.innerHTML = "";
  const savedVoice = localStorage.getItem("msaVoice");
  for (const v of voices) {
    const option = document.createElement("option");
    option.value = v.name;
    option.textContent = "🗣️ " + v.name;
    if (v.name === savedVoice) option.selected = true;
    voicePicker.appendChild(option);
  }
}
loadVoices();
speechSynthesis.addEventListener("voiceschanged", loadVoices);

voicePicker.addEventListener("change", () => {
  // Remember the choice, and say a hello so you can hear it right away
  localStorage.setItem("msaVoice", voicePicker.value);
  readAloud("Hi! I will read the cards!");
});

function readAloud(text) {
  // The browser's built-in voice reads the card out loud (from SPEC.md)
  speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 0.95;
  const chosen = speechSynthesis.getVoices().find(v => v.name === voicePicker.value);
  if (chosen) speech.voice = chosen;
  speechSynthesis.speak(speech);
}

function showCurrentCard() {
  const card = cards[cardIndex];

  bigCard.innerHTML = "";
  const emoji = document.createElement("div");
  emoji.className = "emoji";
  emoji.textContent = card.emoji;

  const title = document.createElement("h2");
  title.textContent = "Step " + (cardIndex + 1) + ": " + card.title;

  const say = document.createElement("div");
  say.className = "say";
  say.textContent = card.say;

  const setup = document.createElement("div");
  setup.className = "setup";
  setup.textContent =
    "🎥 Camera: " + card.camera + "\n" +
    "💡 Lights: " + card.lights + "\n" +
    "🎤 Sound: " + card.sound + "\n" +
    "✂️ Edit in CapCut: " + card.edit;

  bigCard.append(emoji, title, say, setup);

  // Progress dots: ● for where we are, ○ for the rest
  cardDots.textContent = cards.map(
    (_, i) => (i === cardIndex ? "●" : "○")
  ).join("");

  document.getElementById("backButton").disabled = (cardIndex === 0);
  document.getElementById("nextButton").disabled = (cardIndex === cards.length - 1);
}

function openCardMode() {
  cardIndex = 0;
  cardMode.classList.add("open");
  cardsButton.classList.remove("ready");   // job done — stop glowing
  showCurrentCard();
}

document.getElementById("nextButton").addEventListener("click", () => {
  cardIndex = cardIndex + 1;
  showCurrentCard();
});
document.getElementById("backButton").addEventListener("click", () => {
  cardIndex = cardIndex - 1;
  showCurrentCard();
});
document.getElementById("hearButton").addEventListener("click", () => {
  readAloud(cards[cardIndex].say);
});
document.getElementById("exitButton").addEventListener("click", () => {
  speechSynthesis.cancel();
  cardMode.classList.remove("open");
});

// ---- Home page + saving movies ----
// Saved movies live in this browser's own memory, on this computer only.
// They contain the story cards — never anything about the kids.
const homePage = document.getElementById("homePage");

function loadMovies() {
  return JSON.parse(localStorage.getItem("msaMovies") || "[]");
}

function showHomePage() {
  const listBox = document.getElementById("savedList");
  listBox.innerHTML = "";

  for (const movie of loadMovies()) {
    const row = document.createElement("div");
    row.className = "savedMovie";

    const open = document.createElement("button");
    open.className = "openMovie";
    open.textContent = "🎞️ " + movie.name;
    open.addEventListener("click", () => {
      homePage.classList.remove("open");
      cards = movie.cards;
      storyReady = true;
      openCardMode();
    });

    const trash = document.createElement("button");
    trash.className = "deleteMovie";
    trash.textContent = "🗑️";
    trash.title = "Delete " + movie.name;
    trash.addEventListener("click", () => {
      if (confirm('Delete "' + movie.name + '"? This cannot be undone.')) {
        localStorage.setItem("msaMovies",
          JSON.stringify(loadMovies().filter(m => m.name !== movie.name)));
        showHomePage();
      }
    });

    row.append(open, trash);
    listBox.appendChild(row);
  }
  homePage.classList.add("open");
}

document.getElementById("newStoryButton").addEventListener("click", () => {
  homePage.classList.remove("open");
  input.focus();
});

document.getElementById("homeButton").addEventListener("click", showHomePage);

document.getElementById("saveButton").addEventListener("click", () => {
  const name = prompt("Name this movie:", "");
  if (!name || !name.trim()) return;

  // Same name = replace the old version
  const movies = loadMovies().filter(m => m.name !== name.trim());
  movies.push({ name: name.trim(), cards: cards });
  localStorage.setItem("msaMovies", JSON.stringify(movies));
  alert('Saved! 🎬 "' + name.trim() + '" is now on the home page.');
});

showHomePage();

cardsButton.addEventListener("click", async () => {
  if (!storyReady) {
    showBubble(
      "Not yet, director! 🎬 Finish brainstorming the whole story first — " +
      "hero, place, problem, fix, and ending. When it's ready, this button will glow!",
      "claude"
    );
    return;
  }

  cardsButton.disabled = true;
  button.disabled = true;
  const waiting = showBubble("🗂️ Making your step cards… (this takes a moment)", "claude");

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ want: "cards", history: history }),
    });
    const reply = await response.json();
    waiting.remove();

    if (reply.error) {
      showBubble("⚠️ " + reply.error, "error");
    } else {
      showBubble("Your step cards are ready, director! 🎬", "claude");
      cards = reply.cards;
      openCardMode();
    }
  } catch {
    waiting.remove();
    showBubble("⚠️ Couldn't reach the server. Is server.py still running?", "error");
  }

  cardsButton.disabled = false;
  button.disabled = false;
});
</script>

</body>
</html>
